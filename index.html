<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DESCO — Admin</title>
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"SF Pro Display"', '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
            body: ['"SF Pro Text"', '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
          },
          colors: {
            desco: {
              50: '#f8f8f7',
              100: '#f0efed',
              200: '#e2e0dc',
              300: '#cbc8c1',
              400: '#a9a59b',
              500: '#8e8a7e',
              600: '#747068',
              700: '#5e5b55',
              800: '#4a4843',
              900: '#1a1918',
              950: '#0d0d0c',
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts - clean premium feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .font-serif {
      font-family: 'DM Serif Display', serif;
    }

    /* Smooth transitions */
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbc8c1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a9a59b; }

    /* Input focus styles */
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #1a1918;
      box-shadow: 0 0 0 1px #1a1918;
    }

    /* Subtle hover on sidebar items */
    .nav-item {
      transition: all 0.15s ease;
    }
    .nav-item:hover {
      background: #f0efed;
    }
    .nav-item.active {
      background: #f0efed;
      font-weight: 500;
    }
  </style>
</head>
<body class="bg-desco-50 text-desco-900 min-h-screen">

  <!-- ===== LOGIN SCREEN ===== -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm fade-in">
      <!-- Logo -->
      <div class="text-center mb-12">
        <h1 class="font-serif text-4xl tracking-tight text-desco-900">DESCO</h1>
        <p class="text-desco-400 text-sm mt-2 tracking-wide uppercase">Admin Panel</p>
      </div>

      <!-- Login Form -->
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-desco-500 uppercase tracking-wider mb-2">Email</label>
          <input 
            id="login-email" 
            type="email" 
            class="w-full px-4 py-3 bg-white border border-desco-200 rounded-lg text-sm transition-all duration-150"
            placeholder="your@email.com"
          />
        </div>
        <div>
          <label class="block text-xs font-medium text-desco-500 uppercase tracking-wider mb-2">Password</label>
          <input 
            id="login-password" 
            type="password" 
            class="w-full px-4 py-3 bg-white border border-desco-200 rounded-lg text-sm transition-all duration-150"
            placeholder="••••••••"
          />
        </div>

        <div id="login-error" class="text-red-500 text-xs hidden"></div>

        <button 
          id="login-btn"
          class="w-full py-3 bg-desco-900 text-white text-sm font-medium rounded-lg 
                 hover:bg-desco-800 active:bg-desco-950 transition-all duration-150 mt-2"
        >
          Sign in
        </button>

        <div class="text-center">
          <button 
            id="toggle-signup-btn"
            class="text-xs text-desco-400 hover:text-desco-600 transition-colors"
          >
            Staff? Create an account
          </button>
        </div>
      </div>

      <!-- Signup Form (hidden by default) -->
      <div id="signup-section" class="hidden space-y-4 mt-8 pt-8 border-t border-desco-200">
        <p class="text-xs text-desco-500 text-center">
          Your email must be pre-authorized by an admin to access the panel.
        </p>
        <div>
          <label class="block text-xs font-medium text-desco-500 uppercase tracking-wider mb-2">Email</label>
          <input 
            id="signup-email" 
            type="email" 
            class="w-full px-4 py-3 bg-white border border-desco-200 rounded-lg text-sm transition-all duration-150"
            placeholder="your@email.com"
          />
        </div>
        <div>
          <label class="block text-xs font-medium text-desco-500 uppercase tracking-wider mb-2">Password</label>
          <input 
            id="signup-password" 
            type="password" 
            class="w-full px-4 py-3 bg-white border border-desco-200 rounded-lg text-sm transition-all duration-150"
            placeholder="Min 8 characters"
          />
        </div>

        <div id="signup-error" class="text-red-500 text-xs hidden"></div>
        <div id="signup-success" class="text-green-600 text-xs hidden"></div>

        <button 
          id="signup-btn"
          class="w-full py-3 bg-desco-900 text-white text-sm font-medium rounded-lg 
                 hover:bg-desco-800 active:bg-desco-950 transition-all duration-150"
        >
          Create account
        </button>
      </div>
    </div>
  </div>

  <!-- ===== MAIN APP SHELL ===== -->
  <div id="app-shell" class="hidden min-h-screen flex">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-desco-200 flex flex-col fixed h-full">
      <!-- Logo -->
      <div class="px-6 py-6 border-b border-desco-100">
        <h1 class="font-serif text-xl tracking-tight">DESCO</h1>
        <p class="text-desco-400 text-[11px] mt-0.5 tracking-wide uppercase">Management</p>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 px-3 py-4 space-y-1">
        <button data-page="bookings" class="nav-item active w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3">
          <svg class="w-4 h-4 text-desco-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Bookings
        </button>
        <button data-page="services" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3">
          <svg class="w-4 h-4 text-desco-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Services
        </button>
        <button data-page="calendar" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3">
          <svg class="w-4 h-4 text-desco-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Calendar
        </button>
        <button data-page="settings" class="nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3">
          <svg class="w-4 h-4 text-desco-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Settings
        </button>
        <!-- Banners managed directly in Supabase -->
        <button id="staff-nav" data-page="staff" class="nav-item hidden w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-3">
          <svg class="w-4 h-4 text-desco-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          Staff
        </button>
      </nav>

      <!-- User section -->
      <div class="px-4 py-4 border-t border-desco-100">
        <div class="flex items-center justify-between">
          <div class="min-w-0">
            <p id="user-email" class="text-xs text-desco-500 truncate"></p>
            <p id="user-role" class="text-[10px] text-desco-400 uppercase tracking-wider"></p>
          </div>
          <button id="logout-btn" class="text-desco-400 hover:text-desco-600 transition-colors p-1.5 rounded-lg hover:bg-desco-50">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64">
      <!-- Header -->
      <header class="sticky top-0 bg-desco-50/80 backdrop-blur-lg border-b border-desco-200 z-10">
        <div class="px-8 py-5 flex items-center justify-between">
          <h2 id="page-title" class="text-lg font-medium">Bookings</h2>
          <div id="page-actions"></div>
        </div>
      </header>

      <!-- Page Content -->
      <div id="page-content" class="px-8 py-6">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- ===== TOAST NOTIFICATIONS ===== -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 space-y-2"></div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
